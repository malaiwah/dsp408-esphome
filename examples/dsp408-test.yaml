    dsp408_id: my_dsp
    kind: MASTER_MUTE
    name: "Master Mute"
    icon: mdi:volume-off

  - platform: dsp408
    dsp408_id: my_dsp
    kind: CHANNEL_MUTE
    channel: 0
    name: "Ch1 Mute"
  - platform: dsp408
    dsp408_id: my_dsp
    kind: CHANNEL_POLAR
    channel: 0
    name: "Ch1 Polar"
    icon: mdi:sine-wave

  - platform: dsp408
    dsp408_id: my_dsp
    kind: CHANNEL_MUTE
    channel: 1
    name: "Ch2 Mute"
  - platform: dsp408
    dsp408_id: my_dsp
    kind: CHANNEL_POLAR
    channel: 1
    name: "Ch2 Polar"
    icon: mdi:sine-wave

  - platform: dsp408
    dsp408_id: my_dsp
    kind: CHANNEL_MUTE
    channel: 2
    name: "Ch3 Mute"
  - platform: dsp408
    dsp408_id: my_dsp
    kind: CHANNEL_POLAR
    channel: 2
    name: "Ch3 Polar"
    icon: mdi:sine-wave

  - platform: dsp408
    dsp408_id: my_dsp
    kind: CHANNEL_MUTE
    channel: 3
    name: "Ch4 Mute"
  - platform: dsp408
    dsp408_id: my_dsp
    kind: CHANNEL_POLAR
    channel: 3
    name: "Ch4 Polar"
    icon: mdi:sine-wave
