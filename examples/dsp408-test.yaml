# DSP-408 ESPHome example — v0.3 full feature surface.
#
# Structure:
#   - All 8 output channels expose volume / mute / polar / delay / HPF freq
#     / LPF freq (the "everyday" controls).
#   - Filter type + slope `select` entities are demoed on Ch1 + Ch2 only,
#     keeping the entity count below the ESPHome native API's practical
#     ceiling (~52 entities seems stable; 60+ select+text entities cause
#     HA<->device API connection churn). Extending to Ch3-Ch8 is mechanical
#     once you have a setup that's tested at higher entity counts.
#   - Preset name + Ch1 name `text` entities for naming.
#   - EQ band (10 per channel) and routing matrix (4×8 cells) writes are
#     exposed as user-defined service ACTIONS rather than entities — too
#     numerous for a useful HA dashboard, more natural as scripted calls.
#
# Total entities: 1 (model) + 1 (preset_name) + 1 (master vol) + 1 (master
# mute) + 6×8 (per-channel basics) + 4 (Ch1 selects) + 4 (Ch2 selects)
# + 1 (Ch1 name) = 60 entities. Adjust down if your HA struggles.

substitutions:
  device_name: dsp408-test
  friendly_name: "DSP-408 Test"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  min_version: "2026.4.0"

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 8MB
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP_CONSOLE_UART_DEFAULT: y
      CONFIG_ESP_CONSOLE_USB_SERIAL_JTAG: n
      CONFIG_ESP_CONSOLE_USB_CDC: n
      CONFIG_ESP_CONSOLE_NONE: n

external_components:
  - source: { type: local, path: ../components }

logger:
  level: DEBUG
  hardware_uart: UART0
  logs:
    dsp408: DEBUG
    usb_host: INFO

api:
  encryption:
    key: !secret api_encryption_key
  # User-defined service actions. EQ bands (10 per channel × 8 channels =
  # 80 cells, 3 fields each) and the routing matrix (up to 8 inputs ×
  # 8 outputs = 64 cells) are too numerous to expose as entities, so
  # they're exposed as callable services. From HA: Developer Tools →
  # Services → esphome.dsp408_test_set_eq_band / set_routing.
  actions:
    - action: set_eq_band
      variables: { channel: int, band: int, freq_hz: int, gain_db: float, q: float }
      then:
        - lambda: |-
            id(my_dsp).request_eq_band(
                static_cast<uint8_t>(channel),
                static_cast<uint8_t>(band),
                static_cast<uint16_t>(freq_hz),
                gain_db, q);
    - action: set_routing
      variables: { channel: int, input_idx: int, enabled: bool }
      then:
        - lambda: |-
            id(my_dsp).request_routing(
                static_cast<uint8_t>(channel),
                static_cast<uint8_t>(input_idx),
                enabled);
    # Save the cached channel state to the device's flash via the
    # multi-frame WRITE path (cmd=0x10000+ch, 296-byte payload). The
    # blob is built from current cache values; EQ region is zeros.
    - action: save_channel_snapshot
      variables: { channel: int }
      then:
        - lambda: |-
            id(my_dsp).request_save_channel_snapshot(
                static_cast<uint8_t>(channel));

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} Hotspot"

captive_portal:

usb_host:
  enable_hubs: false

dsp408:
  id: my_dsp

text_sensor:
  - { platform: dsp408, dsp408_id: my_dsp, kind: MODEL, name: "Model" }

# ─── Numbers (master + per-channel volume/delay/HPF/LPF for 8 channels) ─

number:
  - { platform: dsp408, dsp408_id: my_dsp, kind: MASTER_VOLUME, name: "Master Volume", unit_of_measurement: "dB", icon: mdi:volume-high }

  - { platform: dsp408, dsp408_id: my_dsp, kind: CHANNEL_VOLUME,   channel: 0, name: "Ch1 Volume", unit_of_measurement: "dB" }
  - { platform: dsp408, dsp408_id: my_dsp, kind: CHANNEL_DELAY,    channel: 0, name: "Ch1 Delay",  unit_of_measurement: "samples" }
  - { platform: dsp408, dsp408_id: my_dsp, kind: CHANNEL_HPF_FREQ, channel: 0, name: "Ch1 HPF",    unit_of_measurement: "Hz" }
  - { platform: dsp408, dsp408_id: my_dsp, kind: CHANNEL_LPF_FREQ, channel: 0, name: "Ch1 LPF",    unit_of_measurement: "Hz" }

  - { platform: dsp408, dsp408_id: my_dsp, kind: CHANNEL_VOLUME,   channel: 1, name: "Ch2 Volume", unit_of_measurement: "dB" }
  - { platform: dsp408, dsp408_id: my_dsp, kind: CHANNEL_DELAY,    channel: 1, name: "Ch2 Delay",  unit_of_measurement: "samples" }
  - { platform: dsp408, dsp408_id: my_dsp, kind: CHANNEL_HPF_FREQ, channel: 1, name: "Ch2 HPF",    unit_of_measurement: "Hz" }
  - { platform: dsp408, dsp408_id: my_dsp, kind: CHANNEL_LPF_FREQ, channel: 1, name: "Ch2 LPF",    unit_of_measurement: "Hz" }

  - { platform: dsp408, dsp408_id: my_dsp, kind: CHANNEL_VOLUME,   channel: 2, name: "Ch3 Volume", unit_of_measurement: "dB" }
  - { platform: dsp408, dsp408_id: my_dsp, kind: CHANNEL_DELAY,    channel: 2, name: "Ch3 Delay",  unit_of_measurement: "samples" }
  - { platform: dsp408, dsp408_id: my_dsp, kind: CHANNEL_HPF_FREQ, channel: 2, name: "Ch3 HPF",    unit_of_measurement: "Hz" }
  - { platform: dsp408, dsp408_id: my_dsp, kind: CHANNEL_LPF_FREQ, channel: 2, name: "Ch3 LPF",    unit_of_measurement: "Hz" }

  - { platform: dsp408, dsp408_id: my_dsp, kind: CHANNEL_VOLUME,   channel: 3, name: "Ch4 Volume", unit_of_measurement: "dB" }
  - { platform: dsp408, dsp408_id: my_dsp, kind: CHANNEL_DELAY,    channel: 3, name: "Ch4 Delay",  unit_of_measurement: "samples" }
  - { platform: dsp408, dsp408_id: my_dsp, kind: CHANNEL_HPF_FREQ, channel: 3, name: "Ch4 HPF",    unit_of_measurement: "Hz" }
  - { platform: dsp408, dsp408_id: my_dsp, kind: CHANNEL_LPF_FREQ, channel: 3, name: "Ch4 LPF",    unit_of_measurement: "Hz" }

  - { platform: dsp408, dsp408_id: my_dsp, kind: CHANNEL_VOLUME,   channel: 4, name: "Ch5 Volume", unit_of_measurement: "dB" }
  - { platform: dsp408, dsp408_id: my_dsp, kind: CHANNEL_DELAY,    channel: 4, name: "Ch5 Delay",  unit_of_measurement: "samples" }
  - { platform: dsp408, dsp408_id: my_dsp, kind: CHANNEL_HPF_FREQ, channel: 4, name: "Ch5 HPF",    unit_of_measurement: "Hz" }
  - { platform: dsp408, dsp408_id: my_dsp, kind: CHANNEL_LPF_FREQ, channel: 4, name: "Ch5 LPF",    unit_of_measurement: "Hz" }

  - { platform: dsp408, dsp408_id: my_dsp, kind: CHANNEL_VOLUME,   channel: 5, name: "Ch6 Volume", unit_of_measurement: "dB" }
  - { platform: dsp408, dsp408_id: my_dsp, kind: CHANNEL_DELAY,    channel: 5, name: "Ch6 Delay",  unit_of_measurement: "samples" }
  - { platform: dsp408, dsp408_id: my_dsp, kind: CHANNEL_HPF_FREQ, channel: 5, name: "Ch6 HPF",    unit_of_measurement: "Hz" }
  - { platform: dsp408, dsp408_id: my_dsp, kind: CHANNEL_LPF_FREQ, channel: 5, name: "Ch6 LPF",    unit_of_measurement: "Hz" }

  - { platform: dsp408, dsp408_id: my_dsp, kind: CHANNEL_VOLUME,   channel: 6, name: "Ch7 Volume", unit_of_measurement: "dB" }
  - { platform: dsp408, dsp408_id: my_dsp, kind: CHANNEL_DELAY,    channel: 6, name: "Ch7 Delay",  unit_of_measurement: "samples" }
  - { platform: dsp408, dsp408_id: my_dsp, kind: CHANNEL_HPF_FREQ, channel: 6, name: "Ch7 HPF",    unit_of_measurement: "Hz" }
  - { platform: dsp408, dsp408_id: my_dsp, kind: CHANNEL_LPF_FREQ, channel: 6, name: "Ch7 LPF",    unit_of_measurement: "Hz" }

  - { platform: dsp408, dsp408_id: my_dsp, kind: CHANNEL_VOLUME,   channel: 7, name: "Ch8 Volume", unit_of_measurement: "dB" }
  - { platform: dsp408, dsp408_id: my_dsp, kind: CHANNEL_DELAY,    channel: 7, name: "Ch8 Delay",  unit_of_measurement: "samples" }
  - { platform: dsp408, dsp408_id: my_dsp, kind: CHANNEL_HPF_FREQ, channel: 7, name: "Ch8 HPF",    unit_of_measurement: "Hz" }
  - { platform: dsp408, dsp408_id: my_dsp, kind: CHANNEL_LPF_FREQ, channel: 7, name: "Ch8 LPF",    unit_of_measurement: "Hz" }

  # Compressor demo on Ch1 (firmware-inert in v1.06 but writes round-
  # trip — included to validate the wire format and show the entity
  # surface).
  - { platform: dsp408, dsp408_id: my_dsp, kind: CHANNEL_COMP_ATTACK,    channel: 0, name: "Ch1 Comp Attack",    unit_of_measurement: "ms" }
  - { platform: dsp408, dsp408_id: my_dsp, kind: CHANNEL_COMP_RELEASE,   channel: 0, name: "Ch1 Comp Release",   unit_of_measurement: "ms" }
  - { platform: dsp408, dsp408_id: my_dsp, kind: CHANNEL_COMP_THRESHOLD, channel: 0, name: "Ch1 Comp Threshold" }

# ─── Switches (master + per-channel mute/polar) ────────────────────────

switch:
  - { platform: dsp408, dsp408_id: my_dsp, kind: MASTER_MUTE, name: "Master Mute", icon: mdi:volume-off }

  - { platform: dsp408, dsp408_id: my_dsp, kind: CHANNEL_MUTE,  channel: 0, name: "Ch1 Mute" }
  - { platform: dsp408, dsp408_id: my_dsp, kind: CHANNEL_POLAR, channel: 0, name: "Ch1 Polar", icon: mdi:sine-wave }
  - { platform: dsp408, dsp408_id: my_dsp, kind: CHANNEL_MUTE,  channel: 1, name: "Ch2 Mute" }
  - { platform: dsp408, dsp408_id: my_dsp, kind: CHANNEL_POLAR, channel: 1, name: "Ch2 Polar", icon: mdi:sine-wave }
  - { platform: dsp408, dsp408_id: my_dsp, kind: CHANNEL_MUTE,  channel: 2, name: "Ch3 Mute" }
  - { platform: dsp408, dsp408_id: my_dsp, kind: CHANNEL_POLAR, channel: 2, name: "Ch3 Polar", icon: mdi:sine-wave }
  - { platform: dsp408, dsp408_id: my_dsp, kind: CHANNEL_MUTE,  channel: 3, name: "Ch4 Mute" }
  - { platform: dsp408, dsp408_id: my_dsp, kind: CHANNEL_POLAR, channel: 3, name: "Ch4 Polar", icon: mdi:sine-wave }
  - { platform: dsp408, dsp408_id: my_dsp, kind: CHANNEL_MUTE,  channel: 4, name: "Ch5 Mute" }
  - { platform: dsp408, dsp408_id: my_dsp, kind: CHANNEL_POLAR, channel: 4, name: "Ch5 Polar", icon: mdi:sine-wave }
  - { platform: dsp408, dsp408_id: my_dsp, kind: CHANNEL_MUTE,  channel: 5, name: "Ch6 Mute" }
  - { platform: dsp408, dsp408_id: my_dsp, kind: CHANNEL_POLAR, channel: 5, name: "Ch6 Polar", icon: mdi:sine-wave }
  - { platform: dsp408, dsp408_id: my_dsp, kind: CHANNEL_MUTE,  channel: 6, name: "Ch7 Mute" }
  - { platform: dsp408, dsp408_id: my_dsp, kind: CHANNEL_POLAR, channel: 6, name: "Ch7 Polar", icon: mdi:sine-wave }
  - { platform: dsp408, dsp408_id: my_dsp, kind: CHANNEL_MUTE,  channel: 7, name: "Ch8 Mute" }
  - { platform: dsp408, dsp408_id: my_dsp, kind: CHANNEL_POLAR, channel: 7, name: "Ch8 Polar", icon: mdi:sine-wave }

  # Input-side polar (the one firmware-active field on the cat=0x03
  # plane in v1.06 — verified live). Demoed on Input 1 only.
  - { platform: dsp408, dsp408_id: my_dsp, kind: INPUT_POLAR, channel: 0, name: "Input 1 Polar", icon: mdi:sine-wave }

# ─── Selects (HPF/LPF type + slope demoed on Ch1 + Ch2) ─────────────────

select:
  - { platform: dsp408, dsp408_id: my_dsp, kind: CHANNEL_HPF_FILTER, channel: 0, name: "Ch1 HPF Type" }
  - { platform: dsp408, dsp408_id: my_dsp, kind: CHANNEL_HPF_SLOPE,  channel: 0, name: "Ch1 HPF Slope" }
  - { platform: dsp408, dsp408_id: my_dsp, kind: CHANNEL_LPF_FILTER, channel: 0, name: "Ch1 LPF Type" }
  - { platform: dsp408, dsp408_id: my_dsp, kind: CHANNEL_LPF_SLOPE,  channel: 0, name: "Ch1 LPF Slope" }

# ─── Texts (preset name + Ch1 channel name) ────────────────────────────

text:
  - { platform: dsp408, dsp408_id: my_dsp, kind: PRESET_NAME, name: "Preset Name", mode: text }
  - { platform: dsp408, dsp408_id: my_dsp, kind: CHANNEL_NAME, channel: 0, name: "Ch1 Name", mode: text }
