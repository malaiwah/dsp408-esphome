# DSP-408 ESPHome bench-test config — full v0.2 surface.
# 8 output channels × {volume, mute, delay, polar, HPF, LPF} + master.

substitutions:
  device_name: dsp408-test
  friendly_name: "DSP-408 Test"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  min_version: "2026.4.0"

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 8MB
  framework:
    type: esp-idf
    sdkconfig_options:
      # Force the ESP32-S3's internal USB PHY to host mode by routing
      # the boot ROM console + ESP-IDF console to UART0.
      CONFIG_ESP_CONSOLE_UART_DEFAULT: y
      CONFIG_ESP_CONSOLE_USB_SERIAL_JTAG: n
      CONFIG_ESP_CONSOLE_USB_CDC: n
      CONFIG_ESP_CONSOLE_NONE: n

external_components:
  - source:
      type: local
      path: ../components

logger:
  level: VERBOSE
  hardware_uart: UART0
  logs:
    dsp408: DEBUG
    usb_host: INFO

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} Hotspot"

captive_portal:

# ─── DSP-408 ────────────────────────────────────────────────────────────

usb_host:
  enable_hubs: false

dsp408:
  id: my_dsp

text_sensor:
  - platform: dsp408
    dsp408_id: my_dsp
    kind: MODEL
    name: "Model"

# ─── Master ─────────────────────────────────────────────────────────────

number:
  - platform: dsp408
    dsp408_id: my_dsp
    kind: MASTER_VOLUME
    name: "Master Volume"
    unit_of_measurement: "dB"
    icon: mdi:volume-high

# ─── Per-channel: volume, delay, HPF, LPF ──────────────────────────────
# Generated for channels 0..7. Names use 1-based indexing for users.

  - platform: dsp408
    dsp408_id: my_dsp
    kind: CHANNEL_VOLUME
    channel: 0
    name: "Ch1 Volume"
    unit_of_measurement: "dB"
  - platform: dsp408
    dsp408_id: my_dsp
    kind: CHANNEL_DELAY
    channel: 0
    name: "Ch1 Delay"
    unit_of_measurement: "samples"
    icon: mdi:timer-outline
  - platform: dsp408
    dsp408_id: my_dsp
    kind: CHANNEL_HPF_FREQ
    channel: 0
    name: "Ch1 HPF"
    unit_of_measurement: "Hz"
  - platform: dsp408
    dsp408_id: my_dsp
    kind: CHANNEL_LPF_FREQ
    channel: 0
    name: "Ch1 LPF"
    unit_of_measurement: "Hz"

  - platform: dsp408
    dsp408_id: my_dsp
    kind: CHANNEL_VOLUME
    channel: 1
    name: "Ch2 Volume"
    unit_of_measurement: "dB"
  - platform: dsp408
    dsp408_id: my_dsp
    kind: CHANNEL_DELAY
    channel: 1
    name: "Ch2 Delay"
    unit_of_measurement: "samples"
  - platform: dsp408
    dsp408_id: my_dsp
    kind: CHANNEL_HPF_FREQ
    channel: 1
    name: "Ch2 HPF"
    unit_of_measurement: "Hz"
  - platform: dsp408
    dsp408_id: my_dsp
    kind: CHANNEL_LPF_FREQ
    channel: 1
    name: "Ch2 LPF"
    unit_of_measurement: "Hz"

  - platform: dsp408
    dsp408_id: my_dsp
    kind: CHANNEL_VOLUME
    channel: 2
    name: "Ch3 Volume"
    unit_of_measurement: "dB"
  - platform: dsp408
    dsp408_id: my_dsp
    kind: CHANNEL_DELAY
    channel: 2
    name: "Ch3 Delay"
    unit_of_measurement: "samples"
  - platform: dsp408
    dsp408_id: my_dsp
    kind: CHANNEL_HPF_FREQ
    channel: 2
    name: "Ch3 HPF"
    unit_of_measurement: "Hz"
  - platform: dsp408
    dsp408_id: my_dsp
    kind: CHANNEL_LPF_FREQ
    channel: 2
    name: "Ch3 LPF"
    unit_of_measurement: "Hz"

  - platform: dsp408
    dsp408_id: my_dsp
    kind: CHANNEL_VOLUME
    channel: 3
    name: "Ch4 Volume"
    unit_of_measurement: "dB"
  - platform: dsp408
    dsp408_id: my_dsp
    kind: CHANNEL_DELAY
    channel: 3
    name: "Ch4 Delay"
    unit_of_measurement: "samples"
  - platform: dsp408
    dsp408_id: my_dsp
    kind: CHANNEL_HPF_FREQ
    channel: 3
    name: "Ch4 HPF"
    unit_of_measurement: "Hz"
  - platform: dsp408
    dsp408_id: my_dsp
    kind: CHANNEL_LPF_FREQ
    channel: 3
    name: "Ch4 LPF"
    unit_of_measurement: "Hz"

# ─── Per-channel: mute, polar ──────────────────────────────────────────

switch:
