# Self-exercising bench-test — writes to master volume + mute on a
# timer to validate the OUT path against the spare DSP-408. No WiFi /
# API; serial only.

substitutions:
  device_name: dsp408-wr

esphome:
  name: ${device_name}
  min_version: "2026.4.0"
  on_boot:
    priority: -100
    then:
      # Wait for the connect/identify/master-read sequence to land.
      - delay: 6s
      - logger.log:
          format: "TEST: setting master to -20 dB"
          level: INFO
      - lambda: |-
          id(my_dsp).request_master_volume(-20.0f);
      - delay: 3s
      - logger.log:
          format: "TEST: setting master MUTE on"
          level: INFO
      - lambda: |-
          id(my_dsp).request_master_mute(true);
      - delay: 3s
      - logger.log:
          format: "TEST: setting master MUTE off"
          level: INFO
      - lambda: |-
          id(my_dsp).request_master_mute(false);
      - delay: 3s
      - logger.log:
          format: "TEST: setting master to -5 dB"
          level: INFO
      - lambda: |-
          id(my_dsp).request_master_volume(-5.0f);
      - delay: 3s
      - logger.log:
          format: "TEST: setting Ch1 volume to -15 dB"
          level: INFO
      - lambda: |-
          id(my_dsp).request_channel_volume(0, -15.0f);
      - delay: 3s
      - logger.log:
          format: "TEST: muting Ch1"
          level: INFO
      - lambda: |-
          id(my_dsp).request_channel_mute(0, true);
      - delay: 3s
      - logger.log:
          format: "TEST: unmuting Ch1, volume back to 0 dB"
          level: INFO
      - lambda: |-
          id(my_dsp).request_channel_mute(0, false);
      - delay: 1s
      - lambda: |-
          id(my_dsp).request_channel_volume(0, 0.0f);
      - delay: 3s
      - logger.log:
          format: "TEST: restoring master to 0 dB"
          level: INFO
      - lambda: |-
          id(my_dsp).request_master_volume(0.0f);

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 8MB
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP_CONSOLE_UART_DEFAULT: y
      CONFIG_ESP_CONSOLE_USB_SERIAL_JTAG: n
      CONFIG_ESP_CONSOLE_USB_CDC: n
      CONFIG_ESP_CONSOLE_NONE: n

external_components:
  - source:
      type: local
      path: ../components

logger:
  level: VERBOSE
  hardware_uart: UART0
  logs:
    dsp408: VERBOSE
    usb_host: INFO

usb_host:
  enable_hubs: false

dsp408:
  id: my_dsp

text_sensor:
  - platform: dsp408
    dsp408_id: my_dsp
    kind: MODEL
    name: "DSP-408 Model"

number:
  - platform: dsp408
    dsp408_id: my_dsp
    kind: MASTER_VOLUME
    name: "Master Volume"
    unit_of_measurement: "dB"
  - platform: dsp408
    dsp408_id: my_dsp
    kind: CHANNEL_VOLUME
    channel: 0
    name: "Ch1 Volume"
    unit_of_measurement: "dB"

switch:
  - platform: dsp408
    dsp408_id: my_dsp
    kind: MASTER_MUTE
    name: "Master Mute"
  - platform: dsp408
    dsp408_id: my_dsp
    kind: CHANNEL_MUTE
    channel: 0
    name: "Ch1 Mute"
